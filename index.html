<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GibbTV — AI-Powered Content Network</title>
  <meta name="description" content="GibbTV is an autonomous AI-powered short-form video network spanning 7 channels across TikTok." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #06060f;
      --surface:  rgba(255,255,255,0.04);
      --glass:    rgba(255,255,255,0.06);
      --border:   rgba(255,255,255,0.08);
      --border2:  rgba(255,255,255,0.12);
      --text:     #f0f0f8;
      --muted:    rgba(240,240,248,0.5);
      --dim:      rgba(240,240,248,0.25);
      --accent:   #00e5cc;
      --accent2:  #7c3aed;
      --accent3:  #f97316;
      --glow:     rgba(0,229,204,0.15);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    /* ── Noise texture overlay ──────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }

    /* ── Gradient orbs ─────────────────────────────────────────── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(0,229,204,0.12) 0%, transparent 70%); top: -100px; left: -100px; animation: orb-drift 20s ease-in-out infinite alternate; }
    .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(124,58,237,0.1) 0%, transparent 70%); bottom: 100px; right: -100px; animation: orb-drift 20s ease-in-out infinite alternate; animation-delay: -7s; }
    .orb-3 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(249,115,22,0.08) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%,-50%); animation: orb-drift 20s ease-in-out infinite alternate; animation-delay: -14s; }

    @keyframes orb-drift {
      0%   { transform: translate(0,0) scale(1); }
      33%  { transform: translate(60px,-40px) scale(1.1); }
      66%  { transform: translate(-30px,60px) scale(0.9); }
      100% { transform: translate(40px,20px) scale(1.05); }
    }

    /* ── NAV ────────────────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 900;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
